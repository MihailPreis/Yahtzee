    <body>

        <header class="page-header">
            <h1>Yahtzee</h1>
        </header>

        <main class="container">
            <div class="table-wrapper" id="table-container"></div>

            <div class="controls">
                <div class="control-group">
                    <label for="config-select">Правила:</label>
                    <select id="config-select"></select>
                </div>
                <div class="control-group">
                    <label>👤</label>
                    <div class="stepper" id="player-stepper">
                        <button type="button" class="stepper-btn" id="decrement" aria-label="Уменьшить количество игроков">−</button>
                        <span class="stepper-value" id="player-count-display">2</span>
                        <button type="button" class="stepper-btn" id="increment" aria-label="Увеличить количество игроков">+</button>
                    </div>
                </div>
                <div class="control-group">
                    <button type="button" id="reset-scores" class="btn-reset">Сбросить</button>
                </div>
            </div>
        </main>

    </body>
