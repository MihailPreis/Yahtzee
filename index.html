<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand mx-auto" href="#">
                <h1 class="h4 mb-0 text-white">🎲 Yahtzee</h1>
            </a>
        </div>
    </nav>

    <main class="container my-4 flex-grow-1">

        <div class="table-wrapper table-responsive" id="table-container"></div>

        <div class="row g-3 align-items-end justify-content-center">
            <div class="col-12 col-md-auto">
                <select id="config-select" class="form-select"></select>
            </div>
            <div class="col-5 col-md-auto">
                <div class="input-group input-group-s">
                    <span class="input-group-text">👤</span>
                    <button type="button" class="btn btn-outline-secondary" id="decrement" aria-label="Уменьшить">−</button>
                    <span class="input-group-text fw-bold" id="player-count-display">2</span>
                    <button type="button" class="btn btn-outline-secondary" id="increment" aria-label="Увеличить">+</button>
                </div>
            </div>
            <!-- Кнопка сброса -->
            <div class="col col-md-auto">
                <button type="button" id="reset-scores" class="btn btn-outline-danger">Сбросить</button>
            </div>
            <!-- Кнопка фуллскрина -->
            <div class="col col-md-auto">
                <button type="button" id="fullscreen-btn" class="btn btn-outline-secondary" title="На весь экран (F)">
                    ⛶
                </button>
            </div>
        </div>

    </main>

    <footer class="bg-light py-3 border-top mt-auto">
        <div class="container text-center text-muted small">
            Вводите очки после каждого броска — итоги пересчитываются автоматически
        </div>
    </footer>
